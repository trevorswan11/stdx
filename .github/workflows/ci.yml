name: CI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Set up MSYS2
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja

      - name: Install Ninja (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Fetch dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 4
          retry_wait_seconds: 30
          command: zig build --fetch=all

      - name: Zig build and test (debug)
        run: zig build test

      - name: CMake configure (debug)
        if: matrix.os != 'windows-latest'
        run: cmake -B build-debug -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: CMake build (debug)
        if: matrix.os != 'windows-latest'
        run: cmake --build build-debug --config Debug

      - name: CMake test (debug)
        if: matrix.os != 'windows-latest'
        run: ctest --test-dir build-debug -C Debug --output-on-failure

      - name: CMake configure (debug) - Windows
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: cmake -B build-debug -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: CMake build (debug) - Windows
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: cmake --build build-debug --config Debug

      - name: CMake test (debug) - Windows
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: ctest --test-dir build-debug -C Debug --output-on-failure

      - name: Zig build and test (release)
        run: zig build test -Doptimize=ReleaseFast

      - name: CMake configure (release)
        if: matrix.os != 'windows-latest'
        run: cmake -B build-release -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: CMake build (release)
        if: matrix.os != 'windows-latest'
        run: cmake --build build-release --config Release

      - name: CMake test (release)
        if: matrix.os != 'windows-latest'
        run: ctest --test-dir build-release -C Release --output-on-failure

      - name: CMake configure (release) - Windows
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: cmake -B build-release -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: CMake build (release) - Windows
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: cmake --build build-release --config Release

      - name: CMake test (release) - Windows
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: ctest --test-dir build-release -C Release --output-on-failure

      - name: Run fuzz tests
        if: matrix.os != 'windows-latest'
        run: zig build fuzz

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y clang-format-21
          sudo ln -sf /usr/bin/clang-format-21 /usr/bin/clang-format
          zig build fmt-check

      - name: Static Analysis
        run: zig build check
